name: Deploy Vite Site
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6 
        with:
          node-version: 24
          cache: 'npm'
      
      - run: npm install
      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4 
        with:
          path: './dist'
      - uses: actions/deploy-pages@v4
